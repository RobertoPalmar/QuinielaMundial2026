<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4D06A"/>
      <stop offset="0.5" stop-color="#E0B53D"/>
      <stop offset="1" stop-color="#C8901A"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#0F172A"/>
  <!-- World Cup trophy: globe on top, two curved figures forming the body, base -->
  <g fill="url(#gold)" stroke="#8A5E0A" stroke-width="0.6" stroke-linejoin="round">
    <!-- Globe / top sphere -->
    <circle cx="32" cy="15" r="7"/>
    <!-- Twisting body: two arms sweeping up to hold the globe -->
    <path d="M32 22
             C 27 24 22 28 21 38
             C 20 44 24 48 27 50
             L 37 50
             C 40 48 44 44 43 38
             C 42 28 37 24 32 22 Z"/>
    <!-- Base / pedestal -->
    <rect x="22" y="50" width="20" height="5" rx="1.5"/>
    <rect x="19" y="55" width="26" height="5" rx="2"/>
  </g>
  <!-- subtle highlight on globe -->
  <ellipse cx="29.5" cy="12.5" rx="2.2" ry="3" fill="#FBE9A8" opacity="0.6"/>
</svg>
